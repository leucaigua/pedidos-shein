[build]
  command = "next build"
  publish = ".next"

[build.environment]
  # CATALOGO_PROVIDER no es un secreto: es el identificador del proveedor
  # de catálogo (p. ej. "aliexpress") y aparece de forma legítima en el
  # código y el build. Se excluye del escaneo de secretos de Netlify para
  # que no falle el deploy. Los secretos reales (ANTHROPIC_API_KEY,
  # SUPABASE_SERVICE_ROLE_KEY, TELEGRAM_BOT_TOKEN, etc.) siguen escaneándose.
  SECRETS_SCAN_OMIT_KEYS = "CATALOGO_PROVIDER"

[[plugins]]
  package = "@netlify/plugin-nextjs"
